# Simple workflow for deploying static content to GitHub Pages
name: Deploy github pages site

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.14.0'

      - name: Build rotortree-viz
        run: wasm-pack build --target web --out-dir www/pkg
        working-directory: rotortree-viz

      - name: Assemble site
        run: |
          mkdir -p _site/benchmarks _site/viz _site/differ
          cp assets/index.html _site/
          cp assets/benchmarks/* _site/benchmarks/
          cp assets/differ/* _site/differ/
          cp -r rotortree-viz/www/* _site/viz/

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Bundle site
        run: |
          bun build --target=browser --minify \
            _site/index.html \
            _site/benchmarks/index.html \
            _site/differ/index.html \
            --outdir=_site_bundled
          cp -r _site/viz _site_bundled/viz
          rm -rf _site
          mv _site_bundled _site

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
